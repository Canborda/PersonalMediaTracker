<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16162a"/>
      <stop offset="100%" stop-color="#09090f"/>
    </linearGradient>
    <!-- Dark wood shelf -->
    <linearGradient id="shelf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b3a18"/>
      <stop offset="100%" stop-color="#321908"/>
    </linearGradient>
    <linearGradient id="shelfEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d1f0a"/>
      <stop offset="100%" stop-color="#1e0e04"/>
    </linearGradient>
    <!-- Vertical lines = page edges viewed from the side -->
    <pattern id="pages" x="0" y="0" width="6" height="600" patternUnits="userSpaceOnUse">
      <rect width="5" height="600" fill="#ede8d8"/>
      <rect x="5" width="1" height="600" fill="#b8ae96"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="shadow" x="-20%" y="-10%" width="160%" height="150%">
      <feDropShadow dx="2" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="512" cy="834" rx="380" ry="42" fill="#3b82f6" opacity="0.15" filter="url(#glow)"/>

  <!--
    Layout centered on 512:
    Pink base x=116 w=100 pivot=(216,765) → top-right reaches x≈311
    Gap to teal ≈ 9px. Teal x=320 w=108 | Green x=448 w=100 | Purple x=566 w=106
    Amber x=690 w=96 | Blue x=804 w=106 → right edge=910
    Center: (116+910)/2 = 513 ≈ 512 ✓
  -->
  <g filter="url(#shadow)">

    <!-- TEAL — x=320 w=108 h=505 -->
    <rect x="320" y="260" width="108" height="505" rx="5" fill="#0d9488"/>
    <rect x="333" y="260" width="82" height="505" fill="url(#pages)"/>
    <rect x="415" y="260" width="13" height="505" fill="#0b7a72"/>
    <rect x="320" y="260" width="108" height="9" rx="5" fill="white" opacity="0.13"/>
    <rect x="320" y="269" width="13" height="496" fill="#000" opacity="0.22"/>

    <!-- GREEN — x=448 w=100 h=575 (tallest) -->
    <rect x="448" y="190" width="100" height="575" rx="5" fill="#059669"/>
    <rect x="461" y="190" width="74" height="575" fill="url(#pages)"/>
    <rect x="535" y="190" width="13" height="575" fill="#047857"/>
    <rect x="448" y="190" width="100" height="9" rx="5" fill="white" opacity="0.13"/>
    <rect x="448" y="199" width="13" height="566" fill="#000" opacity="0.22"/>

    <!-- PURPLE — x=566 w=106 h=445 -->
    <rect x="566" y="320" width="106" height="445" rx="5" fill="#7c3aed"/>
    <rect x="579" y="320" width="80" height="445" fill="url(#pages)"/>
    <rect x="659" y="320" width="13" height="445" fill="#6d28d9"/>
    <rect x="566" y="320" width="106" height="9" rx="5" fill="white" opacity="0.13"/>
    <rect x="566" y="329" width="13" height="436" fill="#000" opacity="0.22"/>

    <!-- AMBER — x=690 w=96 h=345 -->
    <rect x="690" y="420" width="96" height="345" rx="5" fill="#d97706"/>
    <rect x="703" y="420" width="70" height="345" fill="url(#pages)"/>
    <rect x="773" y="420" width="13" height="345" fill="#b45309"/>
    <rect x="690" y="420" width="96" height="9" rx="5" fill="white" opacity="0.13"/>
    <rect x="690" y="429" width="13" height="336" fill="#000" opacity="0.22"/>

    <!-- BLUE — x=804 w=106 h=525 -->
    <rect x="804" y="240" width="106" height="525" rx="5" fill="#1d4ed8"/>
    <rect x="817" y="240" width="80" height="525" fill="url(#pages)"/>
    <rect x="897" y="240" width="13" height="525" fill="#1e40af"/>
    <rect x="804" y="240" width="106" height="9" rx="5" fill="white" opacity="0.13"/>
    <rect x="804" y="249" width="13" height="516" fill="#000" opacity="0.22"/>

    <!-- PINK (leaning) — drawn last so it appears in front -->
    <!-- base x=116–216, rotated 12° CW around pivot (216, 765)        -->
    <!-- top-right reaches ≈ x=311, just before teal at x=320          -->
    <g transform="rotate(12, 216, 765)">
      <rect x="116" y="310" width="100" height="455" rx="5" fill="#be185d"/>
      <rect x="129" y="310" width="74" height="455" fill="url(#pages)"/>
      <rect x="203" y="310" width="13" height="455" fill="#9d174d"/>
      <rect x="116" y="310" width="100" height="9" rx="5" fill="white" opacity="0.13"/>
      <rect x="116" y="319" width="13" height="446" fill="#000" opacity="0.22"/>
    </g>

  </g>

  <!-- Shelf plank — dark wood -->
  <rect x="72" y="758" width="880" height="58" rx="8" fill="url(#shelf)"/>
  <!-- Wood grain highlight -->
  <rect x="72" y="758" width="880" height="7" rx="4" fill="white" opacity="0.07"/>
  <rect x="80" y="770" width="864" height="2" rx="1" fill="white" opacity="0.04"/>
  <rect x="80" y="778" width="864" height="2" rx="1" fill="white" opacity="0.03"/>
  <!-- Shelf underside -->
  <rect x="80" y="808" width="864" height="20" rx="5" fill="url(#shelfEdge)"/>
</svg>
