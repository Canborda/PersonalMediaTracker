<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16162a"/>
      <stop offset="100%" stop-color="#09090f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="leftPg" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#e2e4f4"/>
      <stop offset="100%" stop-color="#c8cbdf"/>
    </linearGradient>
    <linearGradient id="rightPg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e4f4"/>
      <stop offset="100%" stop-color="#c8cbdf"/>
    </linearGradient>
    <filter id="bookShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="32" stdDeviation="30" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Ambient blue glow beneath book -->
  <ellipse cx="512" cy="660" rx="290" ry="48" fill="#3b82f6" opacity="0.28" filter="url(#ambientGlow)"/>

  <!-- Book -->
  <g filter="url(#bookShadow)">
    <!-- Left page -->
    <polygon points="178,278 490,266 490,732 178,744" fill="url(#leftPg)"/>
    <!-- Right page -->
    <polygon points="534,266 846,278 846,744 534,732" fill="url(#rightPg)"/>
    <!-- Spine -->
    <rect x="490" y="266" width="44" height="466" fill="url(#blue)"/>
    <!-- Spine highlight -->
    <rect x="490" y="266" width="16" height="466" fill="white" opacity="0.16"/>
  </g>

  <!-- Text lines – left page -->
  <g fill="#6a72a4" opacity="0.42">
    <rect x="213" y="322" width="238" height="12" rx="6"/>
    <rect x="213" y="358" width="253" height="9" rx="4"/>
    <rect x="213" y="390" width="242" height="9" rx="4"/>
    <rect x="213" y="422" width="258" height="9" rx="4"/>
    <rect x="213" y="454" width="210" height="9" rx="4"/>
    <rect x="213" y="514" width="248" height="9" rx="4"/>
    <rect x="213" y="546" width="238" height="9" rx="4"/>
    <rect x="213" y="578" width="254" height="9" rx="4"/>
    <rect x="213" y="610" width="192" height="9" rx="4"/>
    <rect x="213" y="642" width="230" height="9" rx="4"/>
  </g>

  <!-- Text lines – right page -->
  <g fill="#6a72a4" opacity="0.42">
    <rect x="558" y="322" width="248" height="12" rx="6"/>
    <rect x="558" y="358" width="238" height="9" rx="4"/>
    <rect x="558" y="390" width="252" height="9" rx="4"/>
    <rect x="558" y="422" width="240" height="9" rx="4"/>
    <rect x="558" y="454" width="254" height="9" rx="4"/>
    <rect x="558" y="514" width="242" height="9" rx="4"/>
    <rect x="558" y="546" width="255" height="9" rx="4"/>
    <rect x="558" y="578" width="222" height="9" rx="4"/>
    <rect x="558" y="610" width="246" height="9" rx="4"/>
    <rect x="558" y="642" width="204" height="9" rx="4"/>
  </g>

  <!-- Bookmark ribbon -->
  <polygon points="788,266 826,266 826,448 807,422 788,448" fill="url(#blue)" opacity="0.95"/>
  <!-- Bookmark shine -->
  <polygon points="788,266 807,266 807,368 788,356" fill="white" opacity="0.22"/>
</svg>
